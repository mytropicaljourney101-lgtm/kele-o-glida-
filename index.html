<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>כלא או גלידה</title>
<style>
:root{
  --panel: rgba(8, 8, 14, 0.84);
  --border: #ffd166;
  --text: #fff6d6;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;overflow:hidden}
body{
  font-family: Arial, Helvetica, sans-serif;
  background: radial-gradient(circle at top, #46307b 0%, #120d1f 45%, #050409 100%);
  color: var(--text);
  touch-action:none;
}
#app{
  position:relative;
  width:100vw;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}
canvas{
  display:block;
  background:#000;
  border:4px solid var(--border);
  box-shadow:0 0 0 6px #24153f;
  image-rendering:auto;
}
#overlay{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  pointer-events:none;
  padding:8px;
  overflow:auto;
  overscroll-behavior:contain;
}
#scrollHint{
  position:fixed;
  left:50%;
  bottom:10px;
  transform:translateX(-50%);
  z-index:10000;
  display:none;
  pointer-events:none;
  background:rgba(0,0,0,.72);
  color:#fff6d6;
  border:2px solid #ffd166;
  border-radius:999px;
  padding:8px 14px;
  font-size:14px;
  box-shadow:0 8px 18px rgba(0,0,0,.28);
}
#overlay::-webkit-scrollbar{width:0;height:0}
.panel{
  pointer-events:auto;
  width:min(92vw, 760px);
  max-width:92vw;
  max-height:calc(100vh - 24px);
  overflow:auto;
  background:var(--panel);
  border:4px solid var(--border);
  border-radius:22px;
  padding:22px 24px;
  text-align:center;
  backdrop-filter:blur(4px);
  box-shadow:0 18px 40px rgba(0,0,0,.35);
}
.panel::-webkit-scrollbar{width:0;height:0}
.title{font-size:clamp(34px, 6vw, 68px);font-weight:700;text-shadow:0 4px 0 #5f2d00}
.subtitle{font-size:clamp(16px, 2.3vw, 24px);color:#d3fff5;margin-top:10px;line-height:1.35}
.menu-buttons{display:flex;flex-direction:column;gap:12px;align-items:center;margin-top:18px}
button{
  border:0;
  border-radius:16px;
  padding:14px 26px;
  width:min(100%, 320px);
  min-height:54px;
  font-size:clamp(18px, 2.4vw, 24px);
  font-weight:bold;
  cursor:pointer;
  color:#221400;
  background:linear-gradient(180deg,#ffe08a,#ffb347);
  box-shadow:0 6px 0 #935600;
}
button.secondary{background:linear-gradient(180deg,#b8fff5,#59d6ff);box-shadow:0 6px 0 #0d6988}
.character-select{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin:18px 0 10px;align-items:start}
.character-card{
  border:3px solid rgba(255,255,255,.16);
  border-radius:18px;
  padding:14px;
  background:rgba(255,255,255,.05);
  cursor:pointer;
}
.character-card.selected{border-color:#ffd166;box-shadow:0 0 0 3px rgba(255,209,102,.18)}
.character-avatar{
  width:min(132px, 34vw);
  height:min(132px, 34vw);
  margin:0 auto 12px;
  border-radius:16px;
  overflow:hidden;
  border:3px solid rgba(255,255,255,.2);
  background:#1c2030;
}
.character-name{font-size:clamp(22px, 3vw, 28px);font-weight:bold}
.score-list{
  margin:18px auto 22px;
  width:min(100%, 560px);
  text-align:right;
  background:rgba(255,255,255,.04);
  border-radius:16px;
  padding:14px 18px;
  border:2px solid rgba(255,255,255,.12);
}
.score-row{
  display:flex;
  justify-content:space-between;
  gap:12px;
  padding:8px 0;
  border-bottom:1px solid rgba(255,255,255,.08);
  font-size:clamp(16px, 2vw, 20px);
}
.score-row:last-child{border-bottom:0}
.name-input{
  margin:18px 0;
  width:min(100%, 350px);
  font-size:22px;
  padding:12px 14px;
  border-radius:12px;
  border:2px solid #ffd166;
  text-align:center;
}
#rotateWarning{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(4,4,10,.96);
  color:#fff6d6;
  z-index:9999;
  text-align:center;
  padding:24px;
}
#rotateWarning .box{
  max-width:560px;
  border:4px solid #ffd166;
  border-radius:24px;
  padding:28px 24px;
  background:rgba(20,20,32,.92);
}
#rotateWarning .big{font-size:clamp(30px,7vw,60px);font-weight:bold;margin-bottom:12px}
#rotateWarning .small{font-size:clamp(16px,4vw,24px);color:#d3fff5}
@media (max-width:700px){
  #overlay{align-items:center;padding:6px}
  .panel{width:100%;max-width:100%;max-height:calc(100vh - 20px);padding:16px 14px 20px;border-radius:18px}
  .title{font-size:clamp(28px, 8vw, 42px)}
  .subtitle{font-size:clamp(14px, 4vw, 18px);line-height:1.45}
  .character-select{grid-template-columns:1fr 1fr;gap:10px;margin:14px 0 8px}
  .character-card{padding:10px;border-radius:14px}
  .character-avatar{width:min(112px, 28vw);height:min(112px, 28vw);margin:0 auto 8px}
  .character-name{font-size:clamp(18px, 4.5vw, 22px)}
  .menu-buttons{gap:10px;margin-top:14px}
  button{width:100%;min-width:0;font-size:clamp(17px, 4.4vw, 20px);padding:12px 14px;min-height:50px}
  .score-list{padding:10px 12px;margin:14px auto 16px}
  .score-row{font-size:14px}
  .name-input{width:100%;font-size:18px;padding:10px 12px}
}
@media (max-width:420px){
  .character-select{grid-template-columns:1fr}
  .character-avatar{width:min(120px, 34vw);height:min(120px, 34vw)}
}
</style>
</head>
<body>
<div id="app">
  <canvas id="game"></canvas>
  <div id="overlay"></div>
</div>
<div id="scrollHint">גלול למטה</div>
<div id="rotateWarning">
  <div class="box">
    <div class="big">סובב את הטלפון לרוחב כדי לשחק</div>
    <div class="small">המשחק מותאם למסך אופקי</div>
  </div>
</div>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const overlay=document.getElementById('overlay');
const rotateWarning=document.getElementById('rotateWarning');
const scrollHint=document.getElementById('scrollHint');

const coverImage=new Image(); coverImage.src='Image.png';
const hazanAvatar=new Image(); hazanAvatar.src='HAZAN.png';
const revahAvatar=new Image(); revahAvatar.src='REVAH.png';

const TITLE='כלא או גלידה';
const STORAGE_KEY='kela_o_glida_scores_v7';
let state='cover',selectedCharacter='r',winner=null,scoreSaved=false,startTime=0,finishTime=0,blink=0,flash=0,shake=0,cameraX=0,countdown=0,lastTime=0,gameOverReason='';
let altCheatTaps=[],touchStartX=0,touchStartY=0,touchStartTime=0;
let audioCtx=null,audioUnlocked=false;

const player={x:0,baseY:0,speed:0,mashBoost:0,anim:0,taps:[],cps:0,dust:[],jumpY:0,jumpV:0,isJumping:false,name:'רווח',characterId:'r'};
const enemy ={x:0,baseY:0,speed:0,targetSpeed:0,anim:0,phase:0,dust:[],jumpY:0,jumpV:0,isJumping:false,name:'חזן',characterId:'h'};
const officer={active:false,x:0,speed:0,escaped:false,passedPlayer:false};

function getCanvasDisplaySize(){
  const vw=window.innerWidth, vh=window.innerHeight, a=16/9;
  const mobilePad = isMobileLike() ? 10 : 0;
  let w=Math.floor(vw - mobilePad*2), h=Math.floor(w/a);
  if(h>vh-mobilePad*2){ h=Math.floor(vh-mobilePad*2); w=Math.floor(h*a); }
  return {w:Math.max(320,w), h:Math.max(180,h)};
}
function resizeCanvas(){
  const {w,h}=getCanvasDisplaySize();
  canvas.width=w; canvas.height=h;
  canvas.style.width=w+'px'; canvas.style.height=h+'px';
}
function metrics(){
  const W=canvas.width, H=canvas.height, S=Math.min(W/1280,H/720), roadY=H*0.66, roadH=H*0.17, worldLength=W*6.4, finishX=worldLength-W*0.22;
  return {W,H,S,roadY,roadH,worldLength,finishX};
}
function layout(){
  const {W,H}=metrics();
  return {
    hudX:W*0.02,hudY:H*0.02,hudW:Math.min(W*0.34,430),hudH:H*0.24,
    progressX:W*0.38,progressY:H*0.05,progressW:W*0.37,progressH:Math.max(18,H*0.03),
    distanceX:W*0.77,distanceY:H*0.035,distanceW:W*0.20,distanceH:Math.max(28,H*0.05),
    hudTitleFont:Math.max(14,W*0.018), hudBodyFont:Math.max(12,W*0.016)
  };
}
function isMobileLike(){ return window.matchMedia('(pointer: coarse)').matches || /Android|iPhone|iPad|iPod/i.test(navigator.userAgent); }
function isNarrowMobile(){ return isMobileLike() && window.innerWidth <= 700; }
function shouldShowRotateWarning(){ return isMobileLike() && window.innerHeight>window.innerWidth; }
function updateRotateWarning(){ rotateWarning.style.display=shouldShowRotateWarning()?'flex':'none'; }
function updateScrollHint(){
  const canScroll = overlay.scrollHeight > overlay.clientHeight + 4;
  const nearBottom = overlay.scrollTop + overlay.clientHeight >= overlay.scrollHeight - 8;
  const shouldShow = !shouldShowRotateWarning() && canScroll && !nearBottom && state !== 'playing' && state !== 'cover';
  scrollHint.style.display = shouldShow ? 'block' : 'none';
}
function setOverlay(html){
  const prevScroll = overlay.scrollTop;
  overlay.innerHTML=html;
  requestAnimationFrame(()=>{
    if(state==='menu' && isNarrowMobile()){
      overlay.scrollTop = prevScroll;
    } else {
      overlay.scrollTop = 0;
    }
    updateScrollHint();
  });
}
function formatTime(ms){ return (ms/1000).toFixed(2)+' שניות'; }
function getScores(){ try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');}catch{return[];} }
function saveScore(name,timeMs){ const s=getScores(); s.push({name:name||'שחקן',timeMs}); s.sort((a,b)=>a.timeMs-b.timeMs); localStorage.setItem(STORAGE_KEY,JSON.stringify(s.slice(0,10))); }
function escapeHtml(t){ return t.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function ensureAudio(){
  if(!audioCtx){
    const AC = window.AudioContext || window.webkitAudioContext;
    if(AC) audioCtx = new AC();
  }
  if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  audioUnlocked = !!audioCtx;
}
function playTone(freq=440,duration=0.08,type='sine',volume=0.04,slideTo=null){
  if(!audioCtx) return;
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, now);
  if(slideTo){
    osc.frequency.exponentialRampToValueAtTime(Math.max(1, slideTo), now + duration);
  }
  gain.gain.setValueAtTime(0.0001, now);
  gain.gain.exponentialRampToValueAtTime(volume, now + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(now);
  osc.stop(now + duration + 0.02);
}
function playNoise(duration=0.08, volume=0.03, hp=300){
  if(!audioCtx) return;
  const buffer = audioCtx.createBuffer(1, Math.max(1, Math.floor(audioCtx.sampleRate * duration)), audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for(let i=0;i<data.length;i++){
    data[i] = (Math.random()*2-1) * (1 - i/data.length);
  }
  const src = audioCtx.createBufferSource();
  src.buffer = buffer;
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'highpass';
  filter.frequency.value = hp;
  const gain = audioCtx.createGain();
  const now = audioCtx.currentTime;
  gain.gain.setValueAtTime(volume, now);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
  src.connect(filter);
  filter.connect(gain);
  gain.connect(audioCtx.destination);
  src.start(now);
  src.stop(now + duration + 0.02);
}
function playButtonSound(){
  ensureAudio();
  playTone(700, 0.05, 'square', 0.03, 520);
  setTimeout(()=>playTone(520, 0.05, 'square', 0.025, 660), 28);
}
function playCharacterScrollSound(){
  ensureAudio();
  playTone(460, 0.07, 'triangle', 0.03, 620);
}
function playJumpSound(){
  ensureAudio();
  playTone(300, 0.12, 'square', 0.035, 620);
  playNoise(0.04, 0.01, 500);
}
function playLandingSound(){
  ensureAudio();
  playNoise(0.08, 0.028, 220);
  playTone(180, 0.07, 'triangle', 0.02, 120);
}

function showCover(){ state='cover'; setOverlay(''); }
function drawFallbackAvatar(g,charId){
  const x=66,y=48,skin='#f1c27d',uniform='#738c3a',uniformDark='#4c6124',hair='#171717';
  g.fillStyle=uniform; g.fillRect(x-28,y+24,56,72); g.fillStyle=uniformDark; g.fillRect(x-28,y+76,56,16); g.fillStyle='#222a30'; g.fillRect(x-4,y+24,8,72);
  g.fillStyle=skin; g.fillRect(x-8,y+10,16,16); g.beginPath(); g.arc(x,y,30,0,Math.PI*2); g.fill();
  g.fillStyle=hair; g.beginPath(); g.arc(x,y-4,31,Math.PI,Math.PI*2); g.fill(); g.fillRect(x-24,y-4,48,9);
  g.fillStyle='#111'; g.fillRect(x-13,y+2,5,5); g.fillRect(x+8,y+2,5,5); g.fillRect(x-15,y-6,10,3); g.fillRect(x+5,y-6,10,3);
  g.fillStyle='#8a3a2c'; g.fillRect(x-6,y+15,12,2);
  if(charId==='r'){ g.fillStyle='#181818'; g.fillRect(x-16,y+14,32,10); g.fillRect(x-12,y+24,24,8); }
  else{ g.fillStyle='#252525'; g.fillRect(x-10,y+15,20,6); }
}
function drawAvatarInElement(id,charId){
  const host=document.getElementById(id); if(!host) return;
  host.innerHTML='<canvas width="132" height="132" style="width:100%;height:100%;display:block"></canvas>';
  const c=host.querySelector('canvas'), g=c.getContext('2d'), img=charId==='h'?hazanAvatar:revahAvatar;
  if(img.complete&&img.naturalWidth>0) g.drawImage(img,0,0,c.width,c.height); else drawFallbackAvatar(g,charId);
}
function showMenu(){
  state='menu';

  if(isNarrowMobile()){
    const currentName = selectedCharacter==='h' ? 'חזן' : 'רווח';
    setOverlay(
      '<div class="panel" style="width:min(94vw,380px);max-height:min(92vh,560px);padding:14px 12px 16px;overflow:hidden">'+
        '<div class="title" style="font-size:clamp(26px,8vw,38px);margin-bottom:4px">'+TITLE+'</div>'+
        '<div style="margin:8px auto 6px;width:min(112px,28vw);height:min(112px,28vw);border:3px solid rgba(255,255,255,.2);border-radius:18px;overflow:hidden;background:#1c2030" id="mobile-avatar"></div>'+
        '<div style="display:flex;align-items:center;justify-content:center;gap:8px;margin:6px 0 2px">'+
          '<button id="prevCharBtn" type="button" class="secondary" style="width:54px;min-height:44px;padding:8px 0">◀</button>'+
          '<div style="min-width:96px;font-size:clamp(20px,5.6vw,26px);font-weight:bold">'+currentName+'</div>'+
          '<button id="nextCharBtn" type="button" class="secondary" style="width:54px;min-height:44px;padding:8px 0">▶</button>'+
        '</div>'+
        '<p class="subtitle" style="font-size:clamp(12px,3.5vw,15px);margin:4px 0 10px;line-height:1.3">נגיעה = ספרינט · החלקה למעלה = קפיצה</p>'+
        '<div class="menu-buttons" style="margin-top:8px;gap:8px">'+
          '<button id="startBtn" type="button" style="width:100%;font-size:clamp(20px,5vw,24px);min-height:52px;padding:10px 12px">התחל משחק</button>'+
          '<button id="scoresBtn" type="button" class="secondary" style="width:100%;min-height:48px;padding:10px 12px">לוח תוצאות</button>'+
        '</div>'+
      '</div>'
    );

    drawAvatarInElement('mobile-avatar', selectedCharacter);
    document.getElementById('prevCharBtn').onclick = () => {
      const keepScroll=overlay.scrollTop;
      playCharacterScrollSound();
      selectedCharacter = selectedCharacter==='h' ? 'r' : 'h';
      showMenu();
      requestAnimationFrame(()=>{ overlay.scrollTop=keepScroll; updateScrollHint(); });
    };
    document.getElementById('nextCharBtn').onclick = () => {
      const keepScroll=overlay.scrollTop;
      playCharacterScrollSound();
      selectedCharacter = selectedCharacter==='h' ? 'r' : 'h';
      showMenu();
      requestAnimationFrame(()=>{ overlay.scrollTop=keepScroll; updateScrollHint(); });
    };
    document.getElementById('startBtn').onclick = () => { playButtonSound(); startGame(); };
    document.getElementById('scoresBtn').onclick = () => { playButtonSound(); showScoreboard(); };
    return;
  }

  setOverlay('<div class="panel"><div class="title">'+TITLE+'</div><p class="subtitle">בחר דמות, רוץ עם רווח או נגיעה, וקפוץ עם החץ למעלה או החלקה למעלה</p><div class="character-select"><div class="character-card '+(selectedCharacter==='h'?'selected':'')+'" data-char="h"><div class="character-avatar" id="avatar-h"></div><div class="character-name">חזן</div></div><div class="character-card '+(selectedCharacter==='r'?'selected':'')+'" data-char="r"><div class="character-avatar" id="avatar-r"></div><div class="character-name">רווח</div></div></div><div class="menu-buttons"><button id="startBtn" type="button">התחל משחק</button><button id="scoresBtn" type="button" class="secondary">לוח תוצאות</button></div></div>');
  drawAvatarInElement('avatar-h','h');
  drawAvatarInElement('avatar-r','r');
  document.querySelectorAll('.character-card').forEach(card=>card.onclick=()=>{
    const keepScroll=overlay.scrollTop;
    playCharacterScrollSound();
    selectedCharacter=card.dataset.char;
    showMenu();
    requestAnimationFrame(()=>{ overlay.scrollTop=keepScroll; updateScrollHint(); });
  });
  document.getElementById('startBtn').onclick=()=>{ playButtonSound(); startGame(); };
  document.getElementById('scoresBtn').onclick=()=>{ playButtonSound(); showScoreboard(); };
}
function showScoreboard(){
  state='scoreboard';
  const scores=getScores();
  const rows=scores.length ? scores.map((s,i)=>'<div class="score-row"><span>'+(i+1)+'. '+escapeHtml(s.name)+'</span><span>'+formatTime(s.timeMs)+'</span></div>').join('') : '<div class="score-row"><span>עדיין אין תוצאות</span><span>—</span></div>';
  setOverlay('<div class="panel"><div class="title">לוח תוצאות</div><div class="score-list">'+rows+'</div><button id="backBtn" type="button" class="secondary">חזור</button></div>');
  document.getElementById('backBtn').onclick=()=>{ playButtonSound(); showMenu(); };
}
function showResult(){
  const won=winner==='player';
  state='result';
  setOverlay('<div class="panel"><div class="title" style="font-size:clamp(32px,6vw,60px)">'+(won?'🍦 גלידה!':'🚔 גיים אובר')+'</div><p class="subtitle" style="font-size:clamp(18px,3vw,28px)">'+(won?'סיימת את המדס ולא נפלת על דודי. כל השאר זה בונוס!':gameOverReason)+'</p><p class="subtitle" style="margin-top:10px">'+(won?('זמן סיום: '+formatTime(finishTime-startTime)):'קפוץ עם החץ למעלה או החלק למעלה כדי להימנע מדודי')+'</p>'+(won?'<input id="nameInput" class="name-input" maxlength="14" placeholder="כתוב שם ללוח התוצאות" />':'')+'<div class="menu-buttons">'+(won?'<button id="saveBtn" type="button">שמור תוצאה</button>':'')+'<button id="againBtn" type="button" class="secondary">שחק שוב</button><button id="menuBtn" type="button">לתפריט הראשי</button></div></div>');
  document.getElementById('againBtn').onclick=()=>{ playButtonSound(); startGame(); };
  document.getElementById('menuBtn').onclick=()=>{ playButtonSound(); showMenu(); };
  if(won){
    const input=document.getElementById('nameInput');
    input.value='שחקן';
    document.getElementById('saveBtn').onclick=()=>{
      playButtonSound();
      if(scoreSaved) return;
      saveScore(input.value.trim()||'שחקן', finishTime-startTime);
      scoreSaved=true;
      showScoreboard();
    };
  }
}
function resetRacer(r,x,y){ r.x=x; r.baseY=y; r.speed=0; r.anim=0; r.dust=[]; r.jumpY=0; r.jumpV=0; r.isJumping=false; if(r.taps){r.taps=[]; r.cps=0; r.mashBoost=0;} if('phase' in r)r.phase=0; if('targetSpeed' in r)r.targetSpeed=0; altCheatTaps=[]; }
function startGame(){
  const m=metrics();
  state='playing'; overlay.innerHTML=''; winner=null; scoreSaved=false; gameOverReason='';
  if(selectedCharacter==='r'){ player.name='רווח'; player.characterId='r'; enemy.name='חזן'; enemy.characterId='h'; }
  else { player.name='חזן'; player.characterId='h'; enemy.name='רווח'; enemy.characterId='r'; }
  resetRacer(player,m.W*0.20,m.H*0.60); resetRacer(enemy,m.W*0.17,m.H*0.72);
  startTime=performance.now(); finishTime=0; blink=0; flash=0; shake=0; cameraX=0; countdown=1.2;
  officer.active=false; officer.escaped=false; officer.passedPlayer=false; spawnOfficer(true);
}
