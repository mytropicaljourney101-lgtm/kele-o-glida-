<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>כלא או גלידה</title>
<style>
:root{
  --panel:rgba(8,8,14,.82);
  --border:#ffd166;
  --sand:#d8a65c;
  --sand2:#c88f42;
  --road:#3f434a;
  --text:#fff6d6;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%}
body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  overflow:hidden;
  background:radial-gradient(circle at top,#46307b 0%,#120d1f 45%,#050409 100%);
  color:var(--text);
  touch-action:none;
}
#app{
  position:relative;
  width:100vw;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}
canvas{
  width:min(100vw,1280px);
  height:min(100vh,720px);
  aspect-ratio:16/9;
  display:block;
  border:4px solid var(--border);
  box-shadow:0 0 0 6px #24153f;
  background:#000;
  image-rendering:pixelated;
}
#overlay{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  pointer-events:none;
}
.panel{
  pointer-events:auto;
  min-width:min(92vw,720px);
  max-width:92vw;
  background:var(--panel);
  border:4px solid var(--border);
  border-radius:22px;
  padding:24px 28px;
  text-align:center;
  backdrop-filter:blur(3px);
}
.title{font-size:clamp(40px,7vw,72px);font-weight:700;text-shadow:0 4px 0 #5f2d00}
.subtitle{font-size:clamp(18px,2.4vw,26px);color:#d3fff5;margin-top:12px}
.menu-buttons{display:flex;flex-direction:column;gap:14px;align-items:center;margin-top:18px}
button{
  border:0;
  border-radius:16px;
  padding:14px 26px;
  min-width:220px;
  font-size:24px;
  font-weight:bold;
  cursor:pointer;
  color:#221400;
  background:linear-gradient(180deg,#ffe08a,#ffb347);
  box-shadow:0 6px 0 #935600
}
button.secondary{background:linear-gradient(180deg,#b8fff5,#59d6ff);box-shadow:0 6px 0 #0d6988}
.character-select{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin:18px 0 10px}
.character-card{
  width:min(220px,100%);
  border:3px solid rgba(255,255,255,.16);
  border-radius:18px;
  padding:16px;
  background:rgba(255,255,255,.05);
  cursor:pointer
}
.character-card.selected{border-color:#ffd166;box-shadow:0 0 0 3px rgba(255,209,102,.18)}
.character-avatar{
  width:132px;
  height:132px;
  margin:0 auto 12px;
  border-radius:16px;
  overflow:hidden;
  border:3px solid rgba(255,255,255,.2);
  background:#1c2030;
  position:relative
}
.character-name{font-size:28px;font-weight:bold}
.score-list{
  margin:18px auto 22px;
  width:min(100%,520px);
  text-align:right;
  background:rgba(255,255,255,.04);
  border-radius:16px;
  padding:14px 18px;
  border:2px solid rgba(255,255,255,.12)
}
.score-row{
  display:flex;
  justify-content:space-between;
  gap:12px;
  padding:8px 0;
  border-bottom:1px solid rgba(255,255,255,.08);
  font-size:20px
}
.score-row:last-child{border-bottom:0}
.name-input{
  margin:18px 0;
  width:min(100%,350px);
  font-size:22px;
  padding:12px 14px;
  border-radius:12px;
  border:2px solid #ffd166;
  text-align:center
}
#rotateWarning{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(4,4,10,.96);
  color:#fff6d6;
  z-index:9999;
  text-align:center;
  padding:24px;
}
#rotateWarning .box{
  max-width:560px;
  border:4px solid #ffd166;
  border-radius:24px;
  padding:28px 24px;
  background:rgba(20,20,32,.92);
}
#rotateWarning .big{
  font-size:clamp(34px,7vw,64px);
  font-weight:bold;
  margin-bottom:14px;
}
#rotateWarning .small{
  font-size:clamp(18px,3.5vw,28px);
  color:#d3fff5;
}
@media (max-width:700px){
  .panel{padding:20px 18px}
  .score-row{font-size:18px}
  button{font-size:22px;min-width:200px}
}
</style>
</head>
<body>
<div id="app">
  <canvas id="game" width="1280" height="720"></canvas>
  <div id="overlay"></div>
</div>

<div id="rotateWarning">
  <div class="box">
    <div class="big">סובב את הטלפון לרוחב כדי לשחק</div>
    <div class="small">המשחק מותאם למסך אופקי</div>
  </div>
</div>

<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const overlay=document.getElementById('overlay');
const rotateWarning=document.getElementById('rotateWarning');

const mainCoverImage=new Image();
mainCoverImage.src='Image.png';

const hazanAvatar=new Image();
hazanAvatar.src='HAZAN.png';

const revahAvatar=new Image();
revahAvatar.src='REVAH.png';

const TITLE='כלא או גלידה';
const STORAGE_KEY='kela_o_glida_scores_v6';

let state='cover';
let selectedCharacter='r';
let scoreSaved=false;
let winner=null;
let startTime=0;
let finishTime=0;
let gameOverReason='';
let shake=0;
let flash=0;
let blink=0;
let cameraX=0;
let countdown=0;
let last=0;
let altCheatTaps=[];

let touchStartX=0;
let touchStartY=0;
let touchStartTime=0;
let touchMoved=false;

const road={y:470,height:120};
const worldLength=8200;
const finish={x:worldLength-260};

const player={x:260,baseY:430,speed:0,mashBoost:0,anim:0,taps:[],cps:0,dust:[],jumpY:0,jumpV:0,isJumping:false,name:'רווח',characterId:'r'};
const enemy={x:220,baseY:520,speed:0,targetSpeed:0,anim:0,phase:0,dust:[],jumpY:0,jumpV:0,isJumping:false,name:'חזן',characterId:'h'};
const officer={active:false,x:0,speed:0,escaped:false,passedPlayer:false};

function isMobileLike(){
  return window.matchMedia('(pointer: coarse)').matches || /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
}

function shouldShowRotateWarning(){
  return isMobileLike() && window.innerHeight > window.innerWidth;
}

function updateRotateWarning(){
  rotateWarning.style.display = shouldShowRotateWarning() ? 'flex' : 'none';
}

function setOverlay(html){overlay.innerHTML=html}
function formatTime(ms){return (ms/1000).toFixed(2)+' שניות'}
function getScores(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]')}catch{return[]}}
function saveScore(name,timeMs){
  const s=getScores();
  s.push({name:name||'שחקן',timeMs});
  s.sort((a,b)=>a.timeMs-b.timeMs);
  localStorage.setItem(STORAGE_KEY,JSON.stringify(s.slice(0,10)));
}
function escapeHtml(t){return t.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}

function showCover(){
  state='cover';
  setOverlay('');
}

function drawFallbackAvatar(g,charId){
  const x=66,y=48,skin='#f1c27d',uniform='#738c3a',uniformDark='#4c6124',hair='#171717';
  g.fillStyle=uniform;g.fillRect(x-28,y+24,56,72);
  g.fillStyle=uniformDark;g.fillRect(x-28,y+76,56,16);
  g.fillStyle='#222a30';g.fillRect(x-4,y+24,8,72);
  g.fillStyle=skin;g.fillRect(x-8,y+10,16,16);
  g.beginPath();g.arc(x,y,30,0,Math.PI*2);g.fill();
  g.fillStyle=hair;g.beginPath();g.arc(x,y-4,31,Math.PI,Math.PI*2);g.fill();g.fillRect(x-24,y-4,48,9);
  g.fillStyle='#111';g.fillRect(x-13,y+2,5,5);g.fillRect(x+8,y+2,5,5);g.fillRect(x-15,y-6,10,3);g.fillRect(x+5,y-6,10,3);
  g.fillStyle='#8a3a2c';g.fillRect(x-6,y+15,12,2);
  if(charId==='r'){g.fillStyle='#181818';g.fillRect(x-16,y+14,32,10);g.fillRect(x-12,y+24,24,8)}
  else{g.fillStyle='#252525';g.fillRect(x-10,y+15,20,6)}
}

function drawAvatarInElement(id,charId){
  const host=document.getElementById(id);
  if(!host)return;

  host.innerHTML='<canvas width="132" height="132" style="width:132px;height:132px;display:block"></canvas>';
  const c=host.querySelector('canvas');
  const g=c.getContext('2d');

  const img=charId==='h'?hazanAvatar:revahAvatar;
  if(img.complete&&img.naturalWidth>0){
    g.drawImage(img,0,0,c.width,c.height);
  }else{
    drawFallbackAvatar(g,charId);
  }
}

function showMenu(){
  state='menu';
  setOverlay(
    '<div class="panel">' +
      '<div class="title">'+TITLE+'</div>' +
      '<p class="subtitle">בחר דמות, הקש על המסך בזריזות לספרינט, תחליק למעלה בשביל לקפוץ</p>' +
      '<div class="character-select">' +
        '<div class="character-card '+(selectedCharacter==='h'?'selected':'')+'" data-char="h">' +
          '<div class="character-avatar" id="avatar-h"></div>' +
          '<div class="character-name">חזן</div>' +
        '</div>' +
        '<div class="character-card '+(selectedCharacter==='r'?'selected':'')+'" data-char="r">' +
          '<div class="character-avatar" id="avatar-r"></div>' +
          '<div class="character-name">רווח</div>' +
        '</div>' +
      '</div>' +
      '<div class="menu-buttons">' +
        '<button id="startBtn" type="button">התחל משחק</button>' +
        '<button id="scoresBtn" type="button" class="secondary">לוח תוצאות</button>' +
      '</div>' +
    '</div>'
  );
  drawAvatarInElement('avatar-h','h');
  drawAvatarInElement('avatar-r','r');
  document.querySelectorAll('.character-card').forEach(card=>card.addEventListener('click',()=>{selectedCharacter=card.dataset.char;showMenu()}));
  document.getElementById('startBtn').addEventListener('click',e=>{e.preventDefault();e.stopPropagation();startGame()});
  document.getElementById('scoresBtn').addEventListener('click',e=>{e.preventDefault();e.stopPropagation();showScoreboard()});
}

function showScoreboard(){
  state='scoreboard';
  const scores=getScores();
  const rows=scores.length
    ? scores.map((s,i)=>'<div class="score-row"><span>'+(i+1)+'. '+escapeHtml(s.name)+'</span><span>'+formatTime(s.timeMs)+'</span></div>').join('')
    : '<div class="score-row"><span>עדיין אין תוצאות</span><span>—</span></div>';
  setOverlay('<div class="panel"><div class="title">לוח תוצאות</div><div class="score-list">'+rows+'</div><button id="backBtn" type="button" class="secondary">חזור</button></div>');
  document.getElementById('backBtn').onclick=showMenu;
}

function showResult(){
  const won=winner==='player';
  state='result';
  setOverlay(
    '<div class="panel">' +
      '<div class="title" style="font-size:clamp(36px,6vw,64px)">'+(won?'🍦 גלידה!':'🚔 גיים אובר')+'</div>' +
      '<p class="subtitle" style="font-size:clamp(20px,3vw,30px)">'+(won?'סיימת את המדס ולא נפלת על דודי. כל השאר זה בונוס!':gameOverReason)+'</p>' +
      '<p class="subtitle" style="margin-top:10px">'+(won?('זמן סיום: '+formatTime(finishTime-startTime)):'קפוץ עם החץ למעלה או החלק למעלה כדי להימנע מדודי')+'</p>' +
      (won?'<input id="nameInput" class="name-input" maxlength="14" placeholder="כתוב שם ללוח התוצאות" />':'') +
      '<div class="menu-buttons">' +
        (won?'<button id="saveBtn" type="button">שמור תוצאה</button>':'') +
        '<button id="againBtn" type="button" class="secondary">שחק שוב</button>' +
        '<button id="menuBtn" type="button">לתפריט הראשי</button>' +
      '</div>' +
    '</div>'
  );
  document.getElementById('againBtn').onclick=startGame;
  document.getElementById('menuBtn').onclick=showMenu;
  if(won){
    const input=document.getElementById('nameInput');
    input.value='שחקן';
    document.getElementById('saveBtn').onclick=()=>{
      if(scoreSaved)return;
      saveScore(input.value.trim()||'שחקן',finishTime-startTime);
      scoreSaved=true;
      showScoreboard();
    };
  }
}

function resetRacer(r,x,y){
  r.x=x;r.baseY=y;r.speed=0;r.anim=0;r.dust=[];r.jumpY=0;r.jumpV=0;r.isJumping=false;
  if(r.taps){r.taps=[];r.cps=0;r.mashBoost=0}
  if('phase'in r)r.phase=0;
  if('targetSpeed'in r)r.targetSpeed=0;
  altCheatTaps=[];
}

function startGame(){
  state='playing';
  overlay.innerHTML='';
  winner=null;
  scoreSaved=false;
  gameOverReason='';
  if(selectedCharacter==='r'){
    player.name='רווח';player.characterId='r';
    enemy.name='חזן';enemy.characterId='h';
  }else{
    player.name='חזן';player.characterId='h';
    enemy.name='רווח';enemy.characterId='r';
  }
  resetRacer(player,260,430);
  resetRacer(enemy,220,520);
  startTime=performance.now();
  finishTime=0;
  shake=0;
  flash=0;
  countdown=1.2;
  cameraX=0;
  officer.active=false;
  officer.escaped=false;
  officer.passedPlayer=false;
  spawnOfficer(true);
}

function spawnOfficer(initial=false){
  const buffer=initial?760:900+Math.random()*600;
  officer.active=true;
  officer.escaped=false;
  officer.passedPlayer=false;
  officer.x=player.x+buffer+520+Math.random()*240;
  officer.speed=10+Math.random()*2.5;
}

function doJump(r){
  if(r.isJumping)return;
  r.isJumping=true;
  r.jumpV=-15.5;
  r.anim+=1.2;
  shake=Math.min(10,shake+1.5);
  flash=Math.max(flash,.08);
}

function doSprintTap(){
  if(state!=='playing') return;
  const now=performance.now();
  player.taps.push(now);
  player.taps=player.taps.filter(t=>now-t<=1000);
  player.cps=player.taps.length;
  player.mashBoost=Math.min(16,2.5+player.cps*.72);
  player.speed+=1.15+Math.min(player.cps*.14,1.45);
  player.anim+=1;
  spawnDust(player);
  shake=Math.min(10,shake+1.2);
  flash=.14;
}

document.addEventListener('keydown',e=>{
  if(state==='cover'){showMenu();return}
  if(state==='playing'&&e.code==='ArrowUp'&&!e.repeat){e.preventDefault();doJump(player);return}
  if(state==='playing'&&(e.code==='AltLeft'||e.code==='AltRight')&&!e.repeat){
    e.preventDefault();
    const now=performance.now();
    altCheatTaps.push(now);
    altCheatTaps=altCheatTaps.filter(t=>now-t<=500);
    if(altCheatTaps.length>=4){
      player.speed+=14;
      player.mashBoost=Math.max(player.mashBoost,20);
      player.anim+=2;
      spawnDust(player);
      spawnDust(player);
      shake=Math.min(14,shake+2.6);
      flash=.22;
    }
    return;
  }
  if(state==='playing'&&e.code==='Space'&&!e.repeat){
    e.preventDefault();
    doSprintTap();
  }
},{passive:false});

canvas.addEventListener('touchstart',e=>{
  if(shouldShowRotateWarning()) return;
  if(state==='cover'){
    e.preventDefault();
    showMenu();
    return;
  }
  if(state!=='playing') return;

  const t=e.changedTouches[0];
  touchStartX=t.clientX;
  touchStartY=t.clientY;
  touchStartTime=performance.now();
  touchMoved=false;
  e.preventDefault();
},{passive:false});

canvas.addEventListener('touchmove',e=>{
  if(state!=='playing') return;
  touchMoved=true;
  e.preventDefault();
},{passive:false});

canvas.addEventListener('touchend',e=>{
  if(shouldShowRotateWarning()) return;
  if(state!=='playing') return;

  const t=e.changedTouches[0];
  const dx=t.clientX-touchStartX;
  const dy=t.clientY-touchStartY;
  const absX=Math.abs(dx);
  const absY=Math.abs(dy);
  const elapsed=performance.now()-touchStartTime;

  if(dy<-50 && absY>absX){
    doJump(player);
  }else if(elapsed<250){
    doSprintTap();
  }

  e.preventDefault();
},{passive:false});

function spawnDust(r){
  for(let i=0;i<4;i++){
    r.dust.push({
      x:r.x+20+Math.random()*18,
      y:r.baseY+r.jumpY+42+Math.random()*8,
      vx:-1-Math.random()*2,
      vy:-.2-Math.random()*.8,
      life:.6+Math.random()*.4,
      size:4+Math.random()*6
    });
  }
}

function updateDust(list,dt){
  for(let i=list.length-1;i>=0;i--){
    const p=list[i];
    p.x+=p.vx*60*dt;
    p.y+=p.vy*60*dt;
    p.life-=dt;
    p.size*=.985;
    if(p.life<=0)list.splice(i,1);
  }
}

function updateJump(r,dt){
  if(!r.isJumping)return;
  r.jumpV+=34*dt;
  r.jumpY+=r.jumpV;
  if(r.jumpY>=0){
    r.jumpY=0;
    r.jumpV=0;
    r.isJumping=false;
  }
}

function triggerGameOver(){
  winner='enemy';
  finishTime=performance.now();
  gameOverReason='נתפסת על פאק באמינות עכשיו תישלח למעצר בבסיס סודי של חיל האוויר';
  showResult();
}

function updateOfficer(dt){
  if(!officer.active)return;
  officer.x-=officer.speed*60*dt*.22;
  const gap=Math.abs((officer.x+6)-(player.x+18));
  const air=-player.jumpY;
  if(!officer.passedPlayer&&officer.x<player.x-12){
    officer.passedPlayer=true;
    officer.escaped=true;
  }
  if(gap<30&&air<58){
    triggerGameOver();
    return;
  }
  if(officer.x<cameraX-220||officer.escaped)spawnOfficer(false);
}

function updatePlaying(dt,now){
  if(countdown>0)countdown-=dt;
  player.taps=player.taps.filter(t=>now-t<=1000);
  player.cps=player.taps.length;
  player.mashBoost*=Math.pow(.62,dt);
  player.speed*=Math.pow(.55,dt);
  const pv=1.3+player.speed+player.mashBoost;
  player.x+=pv*60*dt*.18;
  player.anim+=pv*dt*.72;

  enemy.phase+=dt;
  const gap=player.x-enemy.x;
  const desired=pv*.985+Math.max(0,gap)*.0048-Math.max(0,-gap)*.0022;
  const eased=Math.max(1.8,desired+Math.sin(enemy.phase*3.8)*.16);
  enemy.targetSpeed+=(eased-enemy.targetSpeed)*Math.min(1,dt*2.3);
  enemy.speed+=(enemy.targetSpeed-enemy.speed)*Math.min(1,dt*3.1);
  enemy.speed=Math.max(1.6,enemy.speed);
  enemy.x+=enemy.speed*60*dt*.18;
  enemy.anim+=enemy.speed*dt*.72;
  if(Math.random()<.16)spawnDust(enemy);

  updateJump(player,dt);
  updateJump(enemy,dt);
  updateOfficer(dt);
  updateDust(player.dust,dt);
  updateDust(enemy.dust,dt);

  cameraX=Math.max(0,player.x-260);
  cameraX=Math.min(cameraX,finish.x-700);
  shake*=Math.pow(.18,dt);
  flash*=Math.pow(.07,dt);
  blink+=dt;

  if(player.x>=finish.x){
    winner='player';
    finishTime=now;
    showResult();
  }else if(enemy.x>=finish.x){
    winner='enemy';
    finishTime=now;
    gameOverReason=enemy.name+' חטף את הגלידה לפניך';
    showResult();
  }
}

function drawSky(){
  const sky=ctx.createLinearGradient(0,0,0,340);
  sky.addColorStop(0,'#5c3ea1');
  sky.addColorStop(.55,'#ef8d4b');
  sky.addColorStop(1,'#ffd28a');
  ctx.fillStyle=sky;
  ctx.fillRect(0,0,canvas.width,360);
}

function drawCactus(x,y,s=1){
  ctx.save();
  ctx.translate(x,y);
  ctx.scale(s,s);
  ctx.fillStyle='#2c8e50';
  ctx.fillRect(-8,-46,16,50);
  ctx.fillRect(-22,-30,12,10);
  ctx.fillRect(10,-34,12,10);
  ctx.fillRect(-22,-52,10,22);
  ctx.fillRect(12,-56,10,22);
  ctx.restore();
}

function drawIceCream(x,y){
  ctx.fillStyle='#c17d3d';
  ctx.beginPath();
  ctx.moveTo(x,y+18);
  ctx.lineTo(x+18,y+18);
  ctx.lineTo(x+9,y+42);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle='#f49ac2';
  ctx.beginPath();
  ctx.arc(x+9,y+8,12,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle='#9ae6ff';
  ctx.beginPath();
  ctx.arc(x+22,y+12,10,0,Math.PI*2);
  ctx.fill();
}

function drawGround(){
  ctx.save();
  ctx.translate(-cameraX,0);
  ctx.fillStyle='#d6a85a';
  ctx.fillRect(cameraX-40,360,canvas.width+worldLength,360);
  ctx.fillStyle='#c79247';
  for(let i=0;i<worldLength+800;i+=24)ctx.fillRect(i,520+((i/24)%2)*4,12,4);
  ctx.fillStyle='#454a52';
  ctx.fillRect(0,road.y,worldLength,road.height);
  ctx.strokeStyle='#f6d04d';
  ctx.lineWidth=6;
  ctx.setLineDash([22,18]);
  ctx.beginPath();
  ctx.moveTo(0,road.y+road.height/2);
  ctx.lineTo(worldLength,road.y+road.height/2);
  ctx.stroke();
  ctx.setLineDash([]);
  for(let i=0;i<40;i++)drawCactus(150+i*210+(i%3)*25,420+(i%4)*65,.75+(i%2)*.18);
  ctx.fillStyle='#f7f1d5';
  ctx.fillRect(finish.x,road.y-16,12,road.height+30);
  for(let y=road.y-16;y<road.y+road.height+20;y+=18){
    ctx.fillStyle=y%36===0?'#111':'#fff';
    ctx.fillRect(finish.x+12,y,18,18);
  }
  drawIceCream(finish.x+60,road.y+40);
  drawIceCream(finish.x+60,road.y+82);
  ctx.restore();
}

function drawDust(list){
  for(const p of list){
    const sx=p.x-cameraX;
    if(sx<-30||sx>canvas.width+30)continue;
    ctx.globalAlpha=Math.max(0,p.life);
    ctx.fillStyle='#f7d7a9';
    ctx.fillRect(sx,p.y,p.size,p.size);
  }
  ctx.globalAlpha=1;
}

function drawRunner(r){
  const bob=r.isJumping?0:Math.sin(r.anim*8)*3;
  const x=r.x-cameraX;
  const y=r.baseY+r.jumpY+bob;
  const frame=Math.floor(r.anim*10)%4;
  if(x<-80||x>canvas.width+80)return;
  drawDust(r.dust);

  const skin='#f1c27d',hair='#151515',uniform='#738c3a',uniformDark='#4a5e21',strap='#20252b',beard=r.characterId==='r';
  const legA=r.isJumping?-16:frame===0?16:frame===1?6:frame===2?-10:2;
  const legB=r.isJumping?18:-legA*.8;
  const armA=r.isJumping?-22:-legA*.7;
  const armB=r.isJumping?20:-armA*.7;

  const limb=(x1,y1,len,angle,color,width)=>{
    const rad=angle*Math.PI/180;
    ctx.strokeStyle=color;
    ctx.lineWidth=width;
    ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(x1,y1);
    ctx.lineTo(x1+Math.cos(rad)*len,y1+Math.sin(rad)*len);
    ctx.stroke();
  };

  limb(x+18,y+40,20,90+legA,uniformDark,10);
  limb(x+18,y+40,20,90+legB,uniformDark,10);
  limb(x+18,y+22,16,90+armA,skin,8);
  limb(x+18,y+22,16,90+armB,skin,8);

  ctx.fillStyle=uniform;
  ctx.fillRect(x+4,y+10,28,28);
  ctx.fillStyle=uniformDark;
  ctx.fillRect(x+4,y+30,28,8);
  ctx.fillStyle=strap;
  ctx.fillRect(x+18,y+10,6,28);
  ctx.fillStyle=skin;
  ctx.beginPath();
  ctx.arc(x+18,y+2,15,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle=hair;
  ctx.beginPath();
  ctx.arc(x+18,y-1,15,Math.PI,Math.PI*2);
  ctx.fill();
  ctx.fillRect(x+6,y-1,24,5);
  ctx.fillStyle='#111';
  ctx.fillRect(x+11,y+18,4,4);
  ctx.fillRect(x+21,y+18,4,4);
  ctx.fillStyle='#8a3a2c';
  ctx.fillRect(x+14,y+24,8,2);
  if(beard){
    ctx.fillStyle='#1b1b1b';
    ctx.fillRect(x+10,y+23,16,8);
    ctx.fillRect(x+12,y+30,12,5);
  }else{
    ctx.fillStyle='#2b2b2b';
    ctx.fillRect(x+12,y+24,11,5);
  }
}

function drawOfficer(){
  if(!officer.active)return;
  const x=officer.x-cameraX;
  if(x<-120||x>canvas.width+120)return;
  const y=player.baseY+Math.sin(last*.03)*2;
  const frame=Math.floor(last*.02)%4;
  const legA=frame===0?18:frame===1?4:frame===2?-12:2;
  const legB=-legA*.8;
  const armA=-legA*.7;
  const armB=-armA*.7;

  const limb=(x1,y1,len,angle,color,width)=>{
    const rad=angle*Math.PI/180;
    ctx.strokeStyle=color;
    ctx.lineWidth=width;
    ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(x1,y1);
    ctx.lineTo(x1+Math.cos(rad)*len,y1+Math.sin(rad)*len);
    ctx.stroke();
  };

  limb(x+18,y+40,20,90+legA,'#22334f',10);
  limb(x+18,y+40,20,90+legB,'#22334f',10);
  limb(x+18,y+22,16,90+armA,'#f1c27d',8);
  limb(x+18,y+22,16,90+armB,'#f1c27d',8);
  ctx.fillStyle='#445a88';
  ctx.fillRect(x+4,y+10,28,28);
  ctx.fillStyle='#22334f';
  ctx.fillRect(x+4,y+30,28,8);
  ctx.fillStyle='#f1c27d';
  ctx.beginPath();
  ctx.arc(x+18,y+2,15,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle='#111';
  ctx.fillRect(x+4,y-8,28,9);
  ctx.fillRect(x+10,y-2,16,3);
  ctx.fillRect(x+12,y+18,4,4);
  ctx.fillRect(x+21,y+18,4,4);
  ctx.fillStyle='#8a3a2c';
  ctx.fillRect(x+12,y+25,12,2);
  ctx.fillStyle='rgba(0,0,0,.55)';
  ctx.fillRect(x-8,y-26,56,18);
  ctx.fillStyle='#fff6d6';
  ctx.font='bold 14px Arial';
  ctx.textAlign='center';
  ctx.fillText('דודי',x+18,y-12);
}

function drawHud(now){
  if(state!=='playing')return;
  ctx.fillStyle='rgba(0,0,0,.45)';
  ctx.fillRect(20,18,420,170);
  ctx.strokeStyle='#ffd166';
  ctx.lineWidth=3;
  ctx.strokeRect(20,18,420,170);
  ctx.fillStyle='#fff6d6';
  ctx.font='bold 24px Arial';
  ctx.textAlign='right';
  ctx.fillText('ספרינט: רווח או נגיעה במסך',418,44);
  ctx.fillText('קפיצה: חץ למעלה או החלקה למעלה',418,72);
  ctx.font='21px Arial';
  ctx.fillText('קצב לחיצה: '+player.cps.toFixed(0),418,104);
  ctx.fillText('דמות: '+player.name,418,132);
  ctx.fillText('זמן: '+formatTime(now-startTime),418,160);
  drawProgressBar(460,34,500,24,player.x,enemy.x);
  drawDistanceBar(980,24,270,34);
}

function drawProgressBar(x,y,w,h,pX,eX){
  ctx.fillStyle='rgba(0,0,0,.4)';
  ctx.fillRect(x,y,w,h);
  ctx.strokeStyle='#ffd166';
  ctx.lineWidth=3;
  ctx.strokeRect(x,y,w,h);
  const start=260,end=finish.x,pT=Math.min(1,Math.max(0,(pX-start)/(end-start))),eT=Math.min(1,Math.max(0,(eX-start)/(end-start)));
  ctx.fillStyle='#5eead4';
  ctx.fillRect(x+pT*w-6,y-4,12,h+8);
  ctx.fillStyle='#ff7b72';
  ctx.fillRect(x+eT*w-6,y-4,12,h+8);
  ctx.fillStyle='#fff';
  ctx.font='18px Arial';
  ctx.textAlign='center';
  ctx.fillText(player.name,x+pT*w,y+h+22);
  ctx.fillText(enemy.name,x+eT*w,y+h+22);
}

function drawDistanceBar(x,y,w,h){
  ctx.fillStyle='rgba(0,0,0,.45)';
  ctx.fillRect(x,y,w,h);
  ctx.strokeStyle='#ffd166';
  ctx.strokeRect(x,y,w,h);
  const ratio=Math.min(1,Math.max(0,player.x/finish.x));
  ctx.fillStyle='#84fab0';
  ctx.fillRect(x+4,y+4,(w-8)*ratio,h-8);
  ctx.fillStyle='#fff';
  ctx.font='bold 18px Arial';
  ctx.textAlign='center';
  ctx.fillText('התקדמות בכביש 90',x+w/2,y+22);
}

function drawTitleOnCanvas(){
  if(state==='cover'){
    const a=.45+(Math.sin(blink*4)+1)*.25;
    ctx.globalAlpha=a;
    ctx.font='bold 64px Arial';
    ctx.textAlign='center';
    ctx.fillStyle='#d7fff7';
    ctx.fillText('לחץ על מקש כלשהו כדי להתחיל',canvas.width/2,646);
    ctx.globalAlpha=1;
  }
}

function drawCoverBackground(){
  const sky=ctx.createLinearGradient(0,0,0,canvas.height);
  sky.addColorStop(0,'#1f2d5d');
  sky.addColorStop(.36,'#385b96');
  sky.addColorStop(.72,'#f09a4b');
  sky.addColorStop(1,'#f4d082');
  ctx.fillStyle=sky;
  ctx.fillRect(0,0,canvas.width,canvas.height);
  const drawDune=(x,baseY,w,h)=>{
    ctx.beginPath();
    ctx.moveTo(x-w/2,baseY);
    ctx.quadraticCurveTo(x,baseY-h,x+w/2,baseY);
    ctx.closePath();
    ctx.fill();
  };
  ctx.fillStyle='#e2b56d';
  drawDune(200,370,260,90);
  drawDune(420,370,320,110);
  drawDune(650,370,240,80);
  drawDune(900,370,300,100);
  drawDune(1120,370,220,70);
  ctx.fillStyle='#d6a85a';
  ctx.fillRect(0,370,canvas.width,350);
  ctx.fillStyle='#c79247';
  for(let i=0;i<canvas.width;i+=28)ctx.fillRect(i,560+((i/28)%2)*4,13,4);
  ctx.fillStyle='#333842';
  ctx.beginPath();
  ctx.moveTo(250,720);
  ctx.bezierCurveTo(340,600,430,525,555,470);
  ctx.bezierCurveTo(670,420,785,408,920,418);
  ctx.bezierCurveTo(1060,430,1170,455,1280,500);
  ctx.lineTo(1280,720);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle='#ffd54a';
  ctx.lineWidth=8;
  ctx.setLineDash([26,20]);
  ctx.beginPath();
  ctx.moveTo(760,720);
  ctx.bezierCurveTo(730,620,720,545,768,495);
  ctx.bezierCurveTo(835,445,958,438,1125,468);
  ctx.stroke();
  ctx.setLineDash([]);
  const cc=(x,y,s=1)=>{
    ctx.save();
    ctx.translate(x,y);
    ctx.scale(s,s);
    ctx.fillStyle='#2c8e50';
    ctx.fillRect(-9,-56,18,62);
    ctx.fillRect(-24,-37,12,12);
    ctx.fillRect(12,-33,12,12);
    ctx.fillRect(-24,-58,10,22);
    ctx.fillRect(14,-56,10,22);
    ctx.restore();
  };
  cc(140,430,1.05);cc(260,420,.9);cc(420,415,.8);cc(610,410,.9);cc(760,418,.85);cc(930,412,.9);cc(1120,425,1);
  const fp=(x,y,s=.9)=>{
    ctx.save();
    ctx.translate(x,y);
    ctx.scale(s,s);
    ctx.fillStyle='#8b5a2b';
    ctx.fillRect(-3,-40,6,40);
    ctx.fillStyle='#2f8f4e';
    ctx.beginPath();ctx.moveTo(0,-40);ctx.lineTo(-20,-30);ctx.lineTo(-6,-28);ctx.fill();
    ctx.beginPath();ctx.moveTo(0,-40);ctx.lineTo(20,-30);ctx.lineTo(6,-28);ctx.fill();
    ctx.beginPath();ctx.moveTo(0,-40);ctx.lineTo(-16,-44);ctx.lineTo(-4,-36);ctx.fill();
    ctx.beginPath();ctx.moveTo(0,-40);ctx.lineTo(16,-44);ctx.lineTo(4,-36);ctx.fill();
    ctx.restore();
  };
  fp(350,418,.85);fp(540,408,.9);fp(720,402,.8);fp(980,410,.95);
  const glow=ctx.createRadialGradient(canvas.width/2,118,20,canvas.width/2,118,220);
  glow.addColorStop(0,'rgba(255,223,120,.34)');
  glow.addColorStop(1,'rgba(255,223,120,0)');
  ctx.fillStyle=glow;
  ctx.fillRect(0,0,canvas.width,280);
  ctx.textAlign='center';
  ctx.lineWidth=8;
  ctx.strokeStyle='#5d2208';
  ctx.fillStyle='#ffe06e';
  ctx.font='bold 82px Arial';
  ctx.strokeText(TITLE,canvas.width/2,128);
  ctx.fillText(TITLE,canvas.width/2,128);
}

function drawMainCoverImage(){
  if(mainCoverImage.complete&&mainCoverImage.naturalWidth>0){
    ctx.drawImage(mainCoverImage,0,0,canvas.width,canvas.height);
    ctx.fillStyle='rgba(0,0,0,0.18)';
    ctx.fillRect(0,0,canvas.width,canvas.height);
  }else{
    drawCoverBackground();
  }
}

function drawScene(now){
  ctx.save();
  const sx=(Math.random()-.5)*shake,sy=(Math.random()-.5)*shake;
  ctx.translate(sx,sy);

  if(state==='cover'){
    drawMainCoverImage();
    drawTitleOnCanvas();
  }else if(state==='menu'||state==='scoreboard'||state==='result'){
    drawCoverBackground();
  }else{
    drawSky();
    drawGround();
    drawRunner(enemy);
    drawOfficer();
    drawRunner(player);
    drawHud(now);
  }

  if(flash>.01){
    ctx.fillStyle='rgba(255,255,255,'+flash+')';
    ctx.fillRect(0,0,canvas.width,canvas.height);
  }
  ctx.restore();
}

async function tryLockLandscape(){
  try{
    if(screen.orientation && screen.orientation.lock && isMobileLike()){
      await screen.orientation.lock('landscape');
    }
  }catch(e){}
}

window.addEventListener('resize', updateRotateWarning);
window.addEventListener('orientationchange', updateRotateWarning);
window.addEventListener('load', ()=>{
  updateRotateWarning();
  tryLockLandscape();
});

function loop(ts){
  const now=ts||performance.now();
  const dt=Math.min(.033,(now-last)/1000||.016);
  last=now;

  updateRotateWarning();

  if(!shouldShowRotateWarning()){
    if(state==='playing') updatePlaying(dt,now);
    else{
      shake*=Math.pow(.18,dt||.016);
      flash*=Math.pow(.07,dt||.016);
      blink+=dt||.016;
      updateDust(player.dust,dt||.016);
      updateDust(enemy.dust,dt||.016);
    }
    drawScene(now);
  }else{
    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawMainCoverImage();
  }

  requestAnimationFrame(loop);
}

showCover();
requestAnimationFrame(loop);
</script>
</body>
